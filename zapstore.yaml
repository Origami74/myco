repository: https://github.com/Origami74/myco
release_source: https://github.com/Origami74/myco
description: |
    Myco is an offline-first, peer-to-peer client for nsites — self-contained web
    apps served straight from a local relay and Blossom store. Pair with people
    nearby over Bluetooth LE to form a mesh, then discover, install, and share
    nsites with no servers and no internet required. Includes built-in chat
    (myco-bitchat) and home-screen install for any nsite.
summary: Offline-first mesh for nsites — share apps peer-to-peer over Bluetooth.
