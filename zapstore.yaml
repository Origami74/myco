description: |
    Share small apps with the people around you by tapping your phones together —
    like handing someone a card. It works completely offline: no internet, no app
    store, no sign-up.

    Tap to share, and the app lands on their phone, ready to open. Everything
    travels straight from phone to phone over Bluetooth, so it keeps working with
    no signal at all — on a plane, at a festival, off in the mountains, or when the
    network goes down.

    Once you've connected with someone you're in each other's circle: pass apps
    back and forth, chat, and see what others nearby are sharing — all without a
    connection. Apps open instantly and live on your phone; pin your favourites to
    the home screen like any other app.

    Comes with a built-in chat to get started, plus a growing set of community
    apps — from group messaging to tools for coordinating in an emergency.

    Your identity is a key that stays on your device, not an account in someone's
    database. Nothing needs a server. Nothing phones home.

    Built for anywhere the internet isn't.
summary: Tap phones to share apps and communicate through them — all offline, no app store, no accounts.
