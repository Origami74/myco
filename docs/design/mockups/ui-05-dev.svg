  <rect x="266" y="652" width="52" height="30" rx="15" fill="#ccfbf1"/>
  <g fill="none" stroke="#0d9488" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="288,661 282,667 288,673"/><polyline points="296,661 302,667 296,673"/><line x1="293" y1="659" x2="291" y2="675"/></g>
  <text x="292" y="702" font-size="10.5" font-weight="700" fill="#0d9488" text-anchor="middle">Dev</text>

  <text x="180" y="752" font-size="12.5" font-style="italic" fill="#64748b" text-anchor="middle">The Dev tab — node, BLE, live peers (node_addr/npub/psm/rssi) and cache counts.</text>
