  <text x="68" y="176" font-size="11.5" fill="#64748b">Status</text>
  <circle cx="250" cy="172" r="3.5" fill="#22c55e"/><text x="294" y="176" font-size="11" font-weight="700" fill="#15803d" text-anchor="end">running</text>
  <text x="68" y="196" font-size="11.5" fill="#64748b">node_addr</text>
  <text x="294" y="196" font-size="11" font-family="Menlo,monospace" fill="#0f172a" text-anchor="end">3f9ad2c7…b1</text>
  <text x="68" y="216" font-size="11.5" fill="#64748b">fips ipv6</text>
  <text x="294" y="216" font-size="11" font-family="Menlo,monospace" fill="#0f172a" text-anchor="end">fd00:5a…:a1b2</text>
  <text x="68" y="236" font-size="11.5" fill="#64748b">mtu</text>
  <text x="294" y="236" font-size="11" font-family="Menlo,monospace" fill="#0f172a" text-anchor="end">1280</text>

  <!-- ===== BLE ===== -->
  <rect x="52" y="262" width="256" height="96" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="68" y="282" font-size="10.5" font-weight="700" fill="#0d9488" letter-spacing="0.8">BLE</text>
  <text x="68" y="304" font-size="11.5" fill="#64748b">adapter</text>
  <text x="294" y="304" font-size="11" font-family="Menlo,monospace" fill="#0f172a" text-anchor="end">Pixel 7</text>
  <text x="68" y="324" font-size="11.5" fill="#64748b">scanning</text>
  <circle cx="258" cy="320" r="3.5" fill="#22c55e"/><text x="294" y="324" font-size="11" font-weight="700" fill="#15803d" text-anchor="end">active</text>
