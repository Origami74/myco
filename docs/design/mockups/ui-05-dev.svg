  <circle cx="143" cy="667" r="9" fill="none" stroke="#94a3b8" stroke-width="2"/><circle cx="143" cy="658" r="2.6" fill="#94a3b8"/><circle cx="136" cy="672" r="2.6" fill="#94a3b8"/><circle cx="150" cy="672" r="2.6" fill="#94a3b8"/>
  <text x="143" y="702" font-size="10.5" font-weight="600" fill="#94a3b8" text-anchor="middle">Circle</text>
  <g stroke="#94a3b8" stroke-width="2" stroke-linecap="round"><line x1="208" y1="660" x2="226" y2="660"/><line x1="208" y1="667" x2="226" y2="667"/><line x1="208" y1="674" x2="226" y2="674"/></g>
  <g fill="#ffffff" stroke="#94a3b8" stroke-width="2"><circle cx="214" cy="660" r="2.6"/><circle cx="221" cy="667" r="2.6"/><circle cx="212" cy="674" r="2.6"/></g>
