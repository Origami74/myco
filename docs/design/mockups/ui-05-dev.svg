  <g font-family="Menlo,monospace" font-size="9.5">
    <circle cx="72" cy="429" r="3.2" fill="#22c55e"/><text x="80" y="432" fill="#0f172a">3f9a…b1</text><text x="150" y="432" fill="#475569">npub1q9x…h4k</text><text x="236" y="432" fill="#475569">0x83</text><text x="290" y="432" fill="#475569" text-anchor="end">-52</text>
    <line x1="66" y1="441" x2="294" y2="441" stroke="#eef2f6" stroke-width="1"/>
    <circle cx="72" cy="456" r="3.2" fill="#22c55e"/><text x="80" y="459" fill="#0f172a">7c2e…04</text><text x="150" y="459" fill="#475569">npub1m2v…7za</text><text x="236" y="459" fill="#475569">0x91</text><text x="290" y="459" fill="#475569" text-anchor="end">-67</text>
    <line x1="66" y1="468" x2="294" y2="468" stroke="#eef2f6" stroke-width="1"/>
    <circle cx="72" cy="483" r="3.2" fill="#22c55e"/><text x="80" y="486" fill="#0f172a">a14f…9d</text><text x="150" y="486" fill="#475569">npub1l8p…q0e</text><text x="236" y="486" fill="#475569">0x85</text><text x="290" y="486" fill="#475569" text-anchor="end">-71</text>
    <line x1="66" y1="495" x2="294" y2="495" stroke="#eef2f6" stroke-width="1"/>
    <circle cx="72" cy="510" r="3.2" fill="#cbd5e1"/><text x="80" y="513" fill="#94a3b8">e0b3…22</text><text x="150" y="513" fill="#cbd5e1">npub1r4t…s9c</text><text x="236" y="513" fill="#cbd5e1">—</text><text x="290" y="513" fill="#cbd5e1" text-anchor="end">—</text>
  </g>
  <text x="80" y="533" font-size="9" fill="#94a3b8">npub shows once Noise completes · last row disconnected</text>

  <!-- ===== CACHE ===== -->
  <rect x="52" y="558" width="256" height="68" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="116" y="592" font-size="16" font-weight="800" fill="#0f172a" text-anchor="middle">1,284</text>
  <text x="116" y="608" font-size="9.5" fill="#94a3b8" text-anchor="middle">relay events</text>
  <line x1="170" y1="572" x2="170" y2="612" stroke="#e2e8f0" stroke-width="1"/>
  <text x="200" y="592" font-size="16" font-weight="800" fill="#0f172a" text-anchor="middle">312</text>
  <text x="200" y="608" font-size="9.5" fill="#94a3b8" text-anchor="middle">blobs</text>
  <line x1="234" y1="572" x2="234" y2="612" stroke="#e2e8f0" stroke-width="1"/>
  <text x="272" y="592" font-size="16" font-weight="800" fill="#0d9488" text-anchor="middle">1.2 GB</text>
  <text x="272" y="608" font-size="9.5" fill="#94a3b8" text-anchor="middle">used</text>

