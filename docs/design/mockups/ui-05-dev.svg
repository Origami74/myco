  <rect x="236" y="83" width="74" height="28" rx="14" fill="#ecfdf5" stroke="#86efac"/>
  <circle cx="251" cy="97" r="6" fill="#bbf7d0"/><circle cx="251" cy="97" r="3.2" fill="#16a34a"/>
