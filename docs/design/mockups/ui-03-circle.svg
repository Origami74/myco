<svg xmlns="http://www.w3.org/2000/svg" width="360" height="770" viewBox="0 0 360 770" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="360" height="770" fill="#ffffff"/>

  <!-- phone shell -->
  <rect x="20" y="18" width="320" height="712" rx="44" fill="#1e293b"/>
  <rect x="31" y="29" width="298" height="690" rx="34" fill="#ffffff"/>
  <rect x="148" y="33" width="64" height="15" rx="7.5" fill="#1e293b"/>

  <!-- status bar -->
  <text x="52" y="53" font-size="11.5" font-weight="700" fill="#0f172a">9:41</text>
  <g fill="#0f172a"><rect x="270" y="49" width="3" height="6" rx="1"/><rect x="275" y="46" width="3" height="9" rx="1"/><rect x="280" y="43" width="3" height="12" rx="1"/></g>
  <rect x="294" y="46" width="17" height="9" rx="2.5" fill="none" stroke="#0f172a" stroke-width="1.2"/>
  <rect x="296" y="48" width="11" height="5" rx="1" fill="#0f172a"/><rect x="311.5" y="48.5" width="2" height="4" rx="1" fill="#0f172a"/>

  <!-- top app bar -->
  <text x="52" y="105" font-size="23" font-weight="800" fill="#0f172a">Circle</text>
  <rect x="236" y="83" width="74" height="28" rx="14" fill="#ecfdf5" stroke="#86efac"/>
  <circle cx="251" cy="97" r="6" fill="#bbf7d0"/><circle cx="251" cy="97" r="3.2" fill="#16a34a"/>
  <text x="262" y="101" font-size="11.5" font-weight="700" fill="#15803d">4 peers</text>
  <text x="52" y="128" font-size="12" fill="#64748b">Paired peers — also the relays you pull from.</text>

  <!-- ===== peer cards ===== -->
  <!-- Ana -->
  <g transform="translate(0,146)">
    <rect x="52" y="0" width="256" height="72" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
    <circle cx="86" cy="36" r="20" fill="#e11d48"/><text x="86" y="42" font-size="17" font-weight="700" fill="#fff" text-anchor="middle">A</text>
    <text x="118" y="28" font-size="14" font-weight="700" fill="#0f172a">Ana</text>
    <circle cx="121" cy="42" r="3.5" fill="#22c55e"/><text x="130" y="46" font-size="11" fill="#475569">Connected · BLE</text>
    <text x="118" y="62" font-size="10" font-family="Menlo,monospace" fill="#94a3b8">npub1q9x…h4k</text>
    <rect x="246" y="13" width="52" height="20" rx="10" fill="#eef2ff" stroke="#c7d2fe"/><text x="272" y="27" font-size="10" font-weight="700" fill="#4f46e5" text-anchor="middle">relay</text>
    <text x="272" y="58" font-size="10.5" fill="#64748b" text-anchor="middle">5 sites</text>
  </g>
  <!-- Ben -->
  <g transform="translate(0,230)">
    <rect x="52" y="0" width="256" height="72" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
    <circle cx="86" cy="36" r="20" fill="#2563eb"/><text x="86" y="42" font-size="17" font-weight="700" fill="#fff" text-anchor="middle">B</text>
    <text x="118" y="28" font-size="14" font-weight="700" fill="#0f172a">Ben</text>
    <circle cx="121" cy="42" r="3.5" fill="#0d9488"/><text x="130" y="46" font-size="11" fill="#475569">Reachable · mesh</text>
    <text x="118" y="62" font-size="10" font-family="Menlo,monospace" fill="#94a3b8">npub1m2v…7za</text>
    <rect x="246" y="13" width="52" height="20" rx="10" fill="#eef2ff" stroke="#c7d2fe"/><text x="272" y="27" font-size="10" font-weight="700" fill="#4f46e5" text-anchor="middle">relay</text>
    <text x="272" y="58" font-size="10.5" fill="#64748b" text-anchor="middle">3 sites</text>
  </g>
  <!-- Cora -->
  <g transform="translate(0,314)">
    <rect x="52" y="0" width="256" height="72" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
    <circle cx="86" cy="36" r="20" fill="#f59e0b"/><text x="86" y="42" font-size="17" font-weight="700" fill="#fff" text-anchor="middle">C</text>
    <text x="118" y="28" font-size="14" font-weight="700" fill="#0f172a">Cora</text>
    <circle cx="121" cy="42" r="3.5" fill="#22c55e"/><text x="130" y="46" font-size="11" fill="#475569">Connected · BLE</text>
    <text x="118" y="62" font-size="10" font-family="Menlo,monospace" fill="#94a3b8">npub1l8p…q0e</text>
    <rect x="246" y="13" width="52" height="20" rx="10" fill="#eef2ff" stroke="#c7d2fe"/><text x="272" y="27" font-size="10" font-weight="700" fill="#4f46e5" text-anchor="middle">relay</text>
    <text x="272" y="58" font-size="10.5" fill="#64748b" text-anchor="middle">2 sites</text>
  </g>
  <!-- Dee (offline) -->
  <g transform="translate(0,398)">
    <rect x="52" y="0" width="256" height="72" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
    <circle cx="86" cy="36" r="20" fill="#7c3aed" opacity="0.55"/><text x="86" y="42" font-size="17" font-weight="700" fill="#fff" text-anchor="middle">D</text>
    <text x="118" y="28" font-size="14" font-weight="700" fill="#334155">Dee</text>
    <circle cx="121" cy="42" r="3.5" fill="#94a3b8"/><text x="130" y="46" font-size="11" fill="#94a3b8">Offline · seen 2h ago</text>
    <text x="118" y="62" font-size="10" font-family="Menlo,monospace" fill="#cbd5e1">npub1r4t…s9c</text>
    <text x="272" y="58" font-size="10.5" fill="#94a3b8" text-anchor="middle">4 sites</text>
  </g>

  <!-- pair CTA -->
  <rect x="52" y="492" width="256" height="46" rx="23" fill="#0d9488"/>
  <rect x="120" y="506" width="18" height="18" rx="4" fill="none" stroke="#ffffff" stroke-width="2"/>
  <rect x="124" y="510" width="4" height="4" fill="#ffffff"/><rect x="130" y="510" width="4" height="4" fill="#ffffff"/><rect x="124" y="516" width="4" height="4" fill="#ffffff"/>
  <text x="150" y="520" font-size="14" font-weight="700" fill="#ffffff">Pair a device</text>
  <text x="180" y="562" font-size="11" fill="#94a3b8" text-anchor="middle">Scan a friend’s code to add them — pairing is always mutual.</text>

  <!-- bottom navigation -->
  <line x1="31" y1="640" x2="329" y2="640" stroke="#e2e8f0" stroke-width="1"/>
  <g fill="#94a3b8"><rect x="59" y="658" width="7" height="7" rx="2"/><rect x="70" y="658" width="7" height="7" rx="2"/><rect x="59" y="669" width="7" height="7" rx="2"/><rect x="70" y="669" width="7" height="7" rx="2"/></g>
  <text x="68" y="702" font-size="10.5" font-weight="600" fill="#94a3b8" text-anchor="middle">Apps</text>
  <!-- Circle (active) -->
  <rect x="117" y="652" width="52" height="30" rx="15" fill="#ccfbf1"/>
  <circle cx="143" cy="667" r="9" fill="none" stroke="#0d9488" stroke-width="2"/><circle cx="143" cy="658" r="2.6" fill="#0d9488"/><circle cx="136" cy="672" r="2.6" fill="#0d9488"/><circle cx="150" cy="672" r="2.6" fill="#0d9488"/>
  <text x="143" y="702" font-size="10.5" font-weight="700" fill="#0d9488" text-anchor="middle">Circle</text>
  <g stroke="#94a3b8" stroke-width="2" stroke-linecap="round"><line x1="208" y1="660" x2="226" y2="660"/><line x1="208" y1="667" x2="226" y2="667"/><line x1="208" y1="674" x2="226" y2="674"/></g>
  <g fill="#ffffff" stroke="#94a3b8" stroke-width="2"><circle cx="214" cy="660" r="2.6"/><circle cx="221" cy="667" r="2.6"/><circle cx="212" cy="674" r="2.6"/></g>
  <text x="217" y="702" font-size="10.5" font-weight="600" fill="#94a3b8" text-anchor="middle">Settings</text>
  <g fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="288,661 282,667 288,673"/><polyline points="296,661 302,667 296,673"/><line x1="293" y1="659" x2="291" y2="675"/></g>
  <text x="292" y="702" font-size="10.5" font-weight="600" fill="#94a3b8" text-anchor="middle">Dev</text>

  <text x="180" y="752" font-size="12.5" font-style="italic" fill="#64748b" text-anchor="middle">Circle = your paired peers; each one doubles as a relay you pull nsites from over the mesh.</text>
</svg>
