<svg xmlns="http://www.w3.org/2000/svg" width="360" height="770" viewBox="0 0 360 770" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="360" height="770" fill="#ffffff"/>

  <!-- ===== phone shell ===== -->
  <rect x="20" y="18" width="320" height="712" rx="44" fill="#1e293b"/>
  <rect x="31" y="29" width="298" height="690" rx="34" fill="#ffffff"/>
  <rect x="148" y="33" width="64" height="15" rx="7.5" fill="#1e293b"/>

  <!-- status bar -->
  <text x="52" y="53" font-size="11.5" font-weight="700" fill="#0f172a">9:41</text>
  <g fill="#0f172a">
    <rect x="270" y="49" width="3" height="6" rx="1"/>
    <rect x="275" y="46" width="3" height="9" rx="1"/>
    <rect x="280" y="43" width="3" height="12" rx="1"/>
  </g>
  <rect x="294" y="46" width="17" height="9" rx="2.5" fill="none" stroke="#0f172a" stroke-width="1.2"/>
  <rect x="296" y="48" width="11" height="5" rx="1" fill="#0f172a"/>
  <rect x="311.5" y="48.5" width="2" height="4" rx="1" fill="#0f172a"/>

  <!-- ===== top app bar ===== -->
  <text x="52" y="109" font-size="23" font-weight="800" fill="#0f172a">Apps</text>
  <!-- peer count, top-right -->
  <rect x="236" y="87" width="74" height="28" rx="14" fill="#ecfdf5" stroke="#86efac"/>
  <circle cx="251" cy="101" r="6" fill="#bbf7d0"/>
  <circle cx="251" cy="101" r="3.2" fill="#16a34a"/>
  <text x="262" y="105" font-size="11.5" font-weight="700" fill="#15803d">4 peers</text>

  <!-- search -->
  <rect x="52" y="130" width="256" height="38" rx="19" fill="#f1f5f9"/>
  <circle cx="73" cy="149" r="5" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <line x1="77" y1="153" x2="81" y2="157" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <text x="90" y="153" font-size="12.5" fill="#94a3b8">Search apps</text>

  <!-- ===== app grid (icons are each site's favicon) ===== -->
  <!-- row 1 -->
  <g transform="translate(59,192)"><rect width="50" height="50" rx="14" fill="#2563eb"/><text x="25" y="34" font-size="24" text-anchor="middle">🔦</text></g>
  <text x="84" y="254" font-size="10.5" font-weight="600" fill="#334155" text-anchor="middle">Hide &amp; Seek</text>
  <g transform="translate(123,192)"><rect width="50" height="50" rx="14" fill="#f59e0b"/><text x="25" y="34" font-size="24" text-anchor="middle">🗺️</text></g>
  <text x="148" y="254" font-size="10.5" font-weight="600" fill="#334155" text-anchor="middle">Event Map</text>
  <g transform="translate(187,192)"><rect width="50" height="50" rx="14" fill="#16a34a"/><text x="25" y="34" font-size="24" text-anchor="middle">💬</text></g>
  <text x="212" y="254" font-size="10.5" font-weight="600" fill="#334155" text-anchor="middle">Party Chat</text>
  <g transform="translate(251,192)"><rect width="50" height="50" rx="14" fill="#7c3aed"/><text x="25" y="34" font-size="24" text-anchor="middle">📖</text></g>
  <text x="276" y="254" font-size="10.5" font-weight="600" fill="#334155" text-anchor="middle">Zine</text>

  <!-- row 2 -->
  <g transform="translate(59,278)"><rect width="50" height="50" rx="14" fill="#e11d48"/><text x="25" y="34" font-size="24" text-anchor="middle">🛒</text></g>
  <text x="84" y="340" font-size="10.5" font-weight="600" fill="#334155" text-anchor="middle">Market</text>
  <g transform="translate(123,278)"><rect width="50" height="50" rx="14" fill="#0ea5e9"/><text x="25" y="34" font-size="24" text-anchor="middle">📝</text></g>
  <text x="148" y="340" font-size="10.5" font-weight="600" fill="#334155" text-anchor="middle">Notes</text>
  <g transform="translate(187,278)"><rect width="50" height="50" rx="14" fill="#db2777"/><text x="25" y="34" font-size="24" text-anchor="middle">📻</text></g>
  <text x="212" y="340" font-size="10.5" font-weight="600" fill="#334155" text-anchor="middle">Radio</text>
  <g transform="translate(251,278)"><rect width="50" height="50" rx="14" fill="#6366f1"/><text x="25" y="34" font-size="24" text-anchor="middle">🖼️</text></g>
  <text x="276" y="340" font-size="10.5" font-weight="600" fill="#334155" text-anchor="middle">Gallery</text>

  <!-- row 3 -->
  <g transform="translate(59,364)"><rect width="50" height="50" rx="14" fill="#ca8a04"/><text x="25" y="34" font-size="24" text-anchor="middle">📚</text></g>
  <text x="84" y="426" font-size="10.5" font-weight="600" fill="#334155" text-anchor="middle">Wiki</text>
  <g transform="translate(123,364)"><rect width="50" height="50" rx="14" fill="#f97316"/><text x="25" y="34" font-size="24" text-anchor="middle">🗣️</text></g>
  <text x="148" y="426" font-size="10.5" font-weight="600" fill="#334155" text-anchor="middle">Forum</text>
  <g transform="translate(187,364)"><rect width="50" height="50" rx="14" fill="#65a30d"/><text x="25" y="34" font-size="24" text-anchor="middle">🍲</text></g>
  <text x="212" y="426" font-size="10.5" font-weight="600" fill="#334155" text-anchor="middle">Recipes</text>
  <g transform="translate(251,364)"><rect width="50" height="50" rx="14" fill="#0891b2"/><text x="25" y="34" font-size="24" text-anchor="middle">🧭</text></g>
  <text x="276" y="426" font-size="10.5" font-weight="600" fill="#334155" text-anchor="middle">Maps</text>

  <!-- row 4 -->
  <g transform="translate(59,450)"><rect width="50" height="50" rx="14" fill="#9333ea"/><text x="25" y="34" font-size="24" text-anchor="middle">🎵</text></g>
  <text x="84" y="512" font-size="10.5" font-weight="600" fill="#334155" text-anchor="middle">Tunes</text>
  <g transform="translate(123,450)"><rect width="50" height="50" rx="14" fill="#dc2626"/><text x="25" y="34" font-size="24" text-anchor="middle">📌</text></g>
  <text x="148" y="512" font-size="10.5" font-weight="600" fill="#334155" text-anchor="middle">Board</text>
  <g transform="translate(187,450)"><rect width="50" height="50" rx="14" fill="#0d9488"/><text x="25" y="34" font-size="23" text-anchor="middle">🍄</text></g>
  <text x="212" y="512" font-size="10.5" font-weight="600" fill="#334155" text-anchor="middle">Myco</text>

  <!-- ===== + bubble (FAB) — opens the pair / QR scanner ===== -->
  <circle cx="288" cy="601" r="26" fill="#0f172a" opacity="0.18"/>
  <circle cx="288" cy="597" r="26" fill="#0d9488"/>
  <g stroke="#ffffff" stroke-width="3" stroke-linecap="round"><line x1="278" y1="597" x2="298" y2="597"/><line x1="288" y1="587" x2="288" y2="607"/></g>

  <!-- ===== bottom navigation ===== -->
  <line x1="31" y1="640" x2="329" y2="640" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Apps (active) -->
  <rect x="42" y="652" width="52" height="30" rx="15" fill="#ccfbf1"/>
  <g fill="#0d9488">
    <rect x="59" y="658" width="7" height="7" rx="2"/><rect x="70" y="658" width="7" height="7" rx="2"/>
    <rect x="59" y="669" width="7" height="7" rx="2"/><rect x="70" y="669" width="7" height="7" rx="2"/>
  </g>
  <text x="68" y="702" font-size="10.5" font-weight="700" fill="#0d9488" text-anchor="middle">Apps</text>
  <!-- Circle -->
  <circle cx="143" cy="667" r="9" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="143" cy="658" r="2.6" fill="#94a3b8"/><circle cx="136" cy="672" r="2.6" fill="#94a3b8"/><circle cx="150" cy="672" r="2.6" fill="#94a3b8"/>
  <text x="143" y="702" font-size="10.5" font-weight="600" fill="#94a3b8" text-anchor="middle">Circle</text>
  <!-- Settings -->
  <g stroke="#94a3b8" stroke-width="2" stroke-linecap="round">
    <line x1="208" y1="660" x2="226" y2="660"/><line x1="208" y1="667" x2="226" y2="667"/><line x1="208" y1="674" x2="226" y2="674"/>
  </g>
  <g fill="#ffffff" stroke="#94a3b8" stroke-width="2"><circle cx="214" cy="660" r="2.6"/><circle cx="221" cy="667" r="2.6"/><circle cx="212" cy="674" r="2.6"/></g>
  <text x="217" y="702" font-size="10.5" font-weight="600" fill="#94a3b8" text-anchor="middle">Settings</text>
  <!-- Dev -->
  <g fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="288,661 282,667 288,673"/><polyline points="296,661 302,667 296,673"/><line x1="293" y1="659" x2="291" y2="675"/>
  </g>
  <text x="292" y="702" font-size="10.5" font-weight="600" fill="#94a3b8" text-anchor="middle">Dev</text>

  <text x="180" y="748" font-size="12.5" font-style="italic" fill="#64748b" text-anchor="middle">Home = an app drawer of installed nsites; each icon is the site's favicon.</text>
  <text x="180" y="765" font-size="12.5" font-style="italic" fill="#64748b" text-anchor="middle">Peer count top-right · the “+” bubble opens the scanner.</text>
</svg>
