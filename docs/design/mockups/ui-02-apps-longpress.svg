<svg xmlns="http://www.w3.org/2000/svg" width="360" height="770" viewBox="0 0 360 770" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <clipPath id="screenClip"><rect x="31" y="29" width="298" height="690" rx="34"/></clipPath>
    <filter id="lift" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.35"/></filter>
    <filter id="menuShadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.28"/></filter>
  </defs>
  <rect width="360" height="770" fill="#ffffff"/>

  <!-- phone shell -->
  <rect x="20" y="18" width="320" height="712" rx="44" fill="#1e293b"/>
  <rect x="31" y="29" width="298" height="690" rx="34" fill="#ffffff"/>
  <rect x="148" y="33" width="64" height="15" rx="7.5" fill="#1e293b"/>

  <!-- status bar -->
  <text x="52" y="53" font-size="11.5" font-weight="700" fill="#0f172a">9:41</text>
  <g fill="#0f172a"><rect x="270" y="49" width="3" height="6" rx="1"/><rect x="275" y="46" width="3" height="9" rx="1"/><rect x="280" y="43" width="3" height="12" rx="1"/></g>
  <rect x="294" y="46" width="17" height="9" rx="2.5" fill="none" stroke="#0f172a" stroke-width="1.2"/>
  <rect x="296" y="48" width="11" height="5" rx="1" fill="#0f172a"/><rect x="311.5" y="48.5" width="2" height="4" rx="1" fill="#0f172a"/>

  <!-- top app bar -->
  <text x="52" y="109" font-size="23" font-weight="800" fill="#0f172a">Apps</text>
  <rect x="236" y="87" width="74" height="28" rx="14" fill="#ecfdf5" stroke="#86efac"/>
  <circle cx="251" cy="101" r="6" fill="#bbf7d0"/><circle cx="251" cy="101" r="3.2" fill="#16a34a"/>
  <text x="262" y="105" font-size="11.5" font-weight="700" fill="#15803d">4 peers</text>

  <!-- the drawer (same as home), drawn so the dim sits over it -->
  <g>
    <rect x="52" y="130" width="256" height="38" rx="19" fill="#f1f5f9"/>
    <g transform="translate(59,192)"><rect width="50" height="50" rx="14" fill="#2563eb"/><text x="25" y="34" font-size="24" text-anchor="middle">🔦</text></g>
    <g transform="translate(123,192)"><rect width="50" height="50" rx="14" fill="#f59e0b"/><text x="25" y="34" font-size="24" text-anchor="middle">🗺️</text></g>
    <g transform="translate(251,192)"><rect width="50" height="50" rx="14" fill="#7c3aed"/><text x="25" y="34" font-size="24" text-anchor="middle">📖</text></g>
    <g transform="translate(59,278)"><rect width="50" height="50" rx="14" fill="#e11d48"/><text x="25" y="34" font-size="24" text-anchor="middle">🛒</text></g>
    <g transform="translate(123,278)"><rect width="50" height="50" rx="14" fill="#0ea5e9"/><text x="25" y="34" font-size="24" text-anchor="middle">📝</text></g>
    <g transform="translate(187,278)"><rect width="50" height="50" rx="14" fill="#db2777"/><text x="25" y="34" font-size="24" text-anchor="middle">📻</text></g>
    <g transform="translate(251,278)"><rect width="50" height="50" rx="14" fill="#6366f1"/><text x="25" y="34" font-size="24" text-anchor="middle">🖼️</text></g>
  </g>

  <!-- ===== dim scrim (long-press engaged) ===== -->
  <rect x="31" y="122" width="298" height="597" fill="#0f172a" opacity="0.55" clip-path="url(#screenClip)"/>

  <!-- ===== the lifted / pressed icon (Party Chat) ===== -->
  <rect x="180" y="180" width="64" height="64" rx="20" fill="none" stroke="#5eead4" stroke-width="2.5"/>
  <g filter="url(#lift)"><rect x="184" y="184" width="56" height="56" rx="16" fill="#16a34a"/></g>
  <text x="212" y="222" font-size="27" text-anchor="middle">💬</text>

  <!-- ===== context menu (Android-style) ===== -->
  <g filter="url(#menuShadow)"><rect x="120" y="250" width="202" height="206" rx="16" fill="#ffffff"/></g>
  <!-- header -->
  <rect x="136" y="262" width="26" height="26" rx="8" fill="#16a34a"/><text x="149" y="281" font-size="13" text-anchor="middle">💬</text>
  <text x="172" y="275" font-size="13" font-weight="700" fill="#0f172a">Party Chat</text>
  <text x="172" y="289" font-size="9.5" fill="#94a3b8">nsite · 0.4 MB · synced</text>
  <line x1="132" y1="300" x2="310" y2="300" stroke="#eef2f6" stroke-width="1"/>

  <!-- row 1: Add to Home screen (primary) -->
  <rect x="126" y="306" width="190" height="36" rx="9" fill="#ccfbf1"/>
  <g stroke="#0f766e" stroke-width="2" stroke-linecap="round"><line x1="142" y1="324" x2="154" y2="324"/><line x1="148" y1="318" x2="148" y2="330"/></g>
  <text x="166" y="328" font-size="12" font-weight="700" fill="#0f766e">Add to Home screen</text>

  <!-- row 2: App info -->
  <circle cx="148" cy="362" r="7" fill="none" stroke="#475569" stroke-width="1.6"/>
  <circle cx="148" cy="358.5" r="1.1" fill="#475569"/><line x1="148" y1="361" x2="148" y2="366" stroke="#475569" stroke-width="1.6" stroke-linecap="round"/>
  <text x="166" y="366" font-size="12" fill="#334155">App info</text>

  <!-- row 3: Re-sync -->
  <path d="M154 399 a7 7 0 1 1 -2.4 -5.2" fill="none" stroke="#475569" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M150 388 L155 393 L150.5 396 Z" fill="#475569"/>
  <text x="166" y="400" font-size="12" fill="#334155">Re-sync now</text>

  <!-- row 4: Remove -->
  <g stroke="#dc2626" stroke-width="1.7" stroke-linecap="round"><line x1="140" y1="427" x2="156" y2="427"/></g>
  <rect x="142" y="429" width="12" height="13" rx="2" fill="none" stroke="#dc2626" stroke-width="1.7"/>
  <line x1="146" y1="425" x2="150" y2="425" stroke="#dc2626" stroke-width="1.7" stroke-linecap="round"/>
  <text x="166" y="438" font-size="12" font-weight="600" fill="#dc2626">Remove app</text>

  <!-- bottom navigation (dimmed under scrim) -->
  <line x1="31" y1="640" x2="329" y2="640" stroke="#475569" stroke-width="1"/>
  <g fill="#cbd5e1"><rect x="59" y="658" width="7" height="7" rx="2"/><rect x="70" y="658" width="7" height="7" rx="2"/><rect x="59" y="669" width="7" height="7" rx="2"/><rect x="70" y="669" width="7" height="7" rx="2"/></g>
  <text x="68" y="702" font-size="10.5" font-weight="700" fill="#cbd5e1" text-anchor="middle">Apps</text>
  <circle cx="143" cy="667" r="9" fill="none" stroke="#64748b" stroke-width="2"/><circle cx="143" cy="658" r="2.6" fill="#64748b"/><circle cx="136" cy="672" r="2.6" fill="#64748b"/><circle cx="150" cy="672" r="2.6" fill="#64748b"/>
  <text x="143" y="702" font-size="10.5" font-weight="600" fill="#64748b" text-anchor="middle">Circle</text>
  <g stroke="#64748b" stroke-width="2" stroke-linecap="round"><line x1="208" y1="660" x2="226" y2="660"/><line x1="208" y1="667" x2="226" y2="667"/><line x1="208" y1="674" x2="226" y2="674"/></g>
  <text x="217" y="702" font-size="10.5" font-weight="600" fill="#64748b" text-anchor="middle">Settings</text>
  <g fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="288,661 282,667 288,673"/><polyline points="296,661 302,667 296,673"/><line x1="293" y1="659" x2="291" y2="675"/></g>
  <text x="292" y="702" font-size="10.5" font-weight="600" fill="#64748b" text-anchor="middle">Dev</text>

  <text x="180" y="752" font-size="12.5" font-style="italic" fill="#64748b" text-anchor="middle">Tap-and-hold an app → the icon lifts and a menu offers “Add to Home screen,” just like Android.</text>
</svg>
