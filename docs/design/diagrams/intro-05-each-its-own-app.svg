<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="960" height="540" fill="#ffffff"/>

  <text x="480" y="54" font-size="29" font-weight="800" fill="#0f172a" text-anchor="middle">Every app gets its own window</text>
  <text x="480" y="86" font-size="15.5" fill="#475569" text-anchor="middle">Apps open full-screen and run side by side — switch between them like any other app.</text>

  <!-- ============ CARD A: Pop-up Event Map (amber), back-left, tilted ============ -->
  <g transform="translate(150,140) rotate(-6)">
    <rect x="5" y="7" width="196" height="272" rx="18" fill="#0f172a" opacity="0.06"/>
    <rect width="196" height="272" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <path d="M0,18 Q0,0 18,0 H178 Q196,0 196,18 V40 H0 Z" fill="#f59e0b"/>
    <rect x="12" y="11" width="18" height="18" rx="5" fill="#ffffff"/><text x="21" y="25" font-size="11" text-anchor="middle">🗺️</text>
    <text x="40" y="26" font-size="12.5" font-weight="700" fill="#ffffff">Pop-up Event Map</text>
    <!-- map content -->
    <rect x="0" y="40" width="196" height="232" fill="#eff6ff"/>
    <path d="M0,150 C50,128 90,180 150,142 C175,126 185,150 196,142 L196,272 L0,272 Z" fill="#dcfce7"/>
    <path d="M0,72 C60,96 120,62 196,96" fill="none" stroke="#93c5fd" stroke-width="6" stroke-linecap="round"/>
    <!-- event pin -->
    <path d="M110,156 L100,132 H120 Z" fill="#e11d48"/>
    <circle cx="110" cy="124" r="12" fill="#e11d48"/>
    <text x="110" y="128" font-size="11" text-anchor="middle">★</text>
    <rect x="20" y="234" width="92" height="20" rx="10" fill="#ffffff" stroke="#f59e0b"/><text x="66" y="248" font-size="10" font-weight="600" fill="#b45309" text-anchor="middle">live · 0.5 km</text>
  </g>

  <!-- ============ CARD C: Hide & Seek (blue), front-right, tilted ============ -->
  <g transform="translate(614,140) rotate(6)">
    <rect x="5" y="7" width="196" height="272" rx="18" fill="#0f172a" opacity="0.06"/>
    <rect width="196" height="272" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <path d="M0,18 Q0,0 18,0 H178 Q196,0 196,18 V40 H0 Z" fill="#2563eb"/>
    <rect x="12" y="11" width="18" height="18" rx="5" fill="#ffffff"/><text x="21" y="25" font-size="11" text-anchor="middle">🔦</text>
    <text x="40" y="26" font-size="13" font-weight="700" fill="#ffffff">Hide &amp; Seek</text>
    <rect x="0" y="40" width="196" height="232" fill="#eff6ff"/>
    <!-- radar -->
    <g fill="none" stroke="#bfdbfe" stroke-width="2">
      <circle cx="98" cy="156" r="30"/><circle cx="98" cy="156" r="58"/><circle cx="98" cy="156" r="86"/>
    </g>
    <g stroke="#dbeafe" stroke-width="1"><line x1="12" y1="156" x2="184" y2="156"/><line x1="98" y1="72" x2="98" y2="240"/></g>
    <line x1="98" y1="156" x2="150" y2="92" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"/>
    <!-- you -->
    <circle cx="98" cy="156" r="6.5" fill="#2563eb"/><circle cx="98" cy="156" r="2.5" fill="#fff"/>
    <!-- hidden players -->
    <circle cx="58" cy="116" r="5" fill="#94a3b8"/>
    <circle cx="142" cy="126" r="5" fill="#94a3b8"/>
    <circle cx="124" cy="206" r="5" fill="#94a3b8"/>
    <!-- found -->
    <circle cx="64" cy="200" r="11" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="3 3"/>
    <circle cx="64" cy="200" r="6" fill="#16a34a"/>
    <g transform="translate(118,236)"><rect width="62" height="20" rx="10" fill="#ffffff" stroke="#16a34a"/><text x="31" y="14" font-size="10" font-weight="700" fill="#15803d" text-anchor="middle">1 found</text></g>
  </g>

  <!-- ============ CARD B: Party Chat (green), centre, upright (front) ============ -->
  <g transform="translate(382,118)">
    <rect x="6" y="8" width="196" height="272" rx="18" fill="#0f172a" opacity="0.10"/>
    <rect width="196" height="272" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <path d="M0,18 Q0,0 18,0 H178 Q196,0 196,18 V40 H0 Z" fill="#16a34a"/>
    <rect x="12" y="11" width="18" height="18" rx="5" fill="#ffffff"/><text x="21" y="25" font-size="11" text-anchor="middle">💬</text>
    <text x="40" y="26" font-size="13" font-weight="700" fill="#ffffff">Party Chat</text>
    <rect x="0" y="40" width="196" height="232" fill="#f8fafc"/>
    <g>
      <rect x="16" y="60" width="104" height="26" rx="13" fill="#e2e8f0"/>
      <rect x="28" y="68" width="70" height="4" rx="2" fill="#94a3b8"/><rect x="28" y="77" width="50" height="4" rx="2" fill="#cbd5e1"/>
      <rect x="76" y="98" width="104" height="26" rx="13" fill="#16a34a"/>
      <rect x="88" y="106" width="70" height="4" rx="2" fill="#dcfce7"/><rect x="88" y="115" width="46" height="4" rx="2" fill="#bbf7d0"/>
      <rect x="16" y="136" width="92" height="26" rx="13" fill="#e2e8f0"/>
      <rect x="28" y="144" width="58" height="4" rx="2" fill="#94a3b8"/><rect x="28" y="153" width="40" height="4" rx="2" fill="#cbd5e1"/>
      <rect x="88" y="174" width="92" height="26" rx="13" fill="#16a34a"/>
      <rect x="100" y="182" width="58" height="4" rx="2" fill="#dcfce7"/><rect x="100" y="191" width="40" height="4" rx="2" fill="#bbf7d0"/>
    </g>
    <rect x="16" y="232" width="130" height="22" rx="11" fill="#ffffff" stroke="#cbd5e1"/>
    <circle cx="166" cy="243" r="13" fill="#16a34a"/><path d="M161,243 H171 M167,239 L171,243 L167,247" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- recents hint -->
  <text x="480" y="430" font-size="13.5" font-weight="700" fill="#334155" text-anchor="middle">▸ Android Recents — swipe to switch between your open apps</text>

  <!-- one-instance tip pill -->
  <g transform="translate(170,446)">
    <rect width="620" height="34" rx="17" fill="#ecfdf5" stroke="#16a34a"/>
    <text x="310" y="22" font-size="12.5" fill="#15803d" text-anchor="middle">Open the same app again → you land back in its window (one per app, never a duplicate).</text>
  </g>

  <text x="480" y="518" font-size="13.5" font-style="italic" fill="#64748b" text-anchor="middle">No tabs buried inside one app — open as many as you like; Myco just launches them.</text>
</svg>
