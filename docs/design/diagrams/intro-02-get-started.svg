<svg xmlns="http://www.w3.org/2000/svg" width="980" height="480" viewBox="0 0 980 480" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="ar" markerWidth="11" markerHeight="11" refX="6" refY="5.5" orient="auto"><path d="M1,1 L10,5.5 L1,10 Z" fill="#2563eb"/></marker>
    <g id="qr">
      <rect width="64" height="64" rx="5" fill="#ffffff" stroke="#cbd5e1"/>
      <rect x="5" y="5" width="18" height="18" fill="#0f172a"/><rect x="10" y="10" width="8" height="8" fill="#fff"/>
      <rect x="41" y="5" width="18" height="18" fill="#0f172a"/><rect x="46" y="10" width="8" height="8" fill="#fff"/>
      <rect x="5" y="41" width="18" height="18" fill="#0f172a"/><rect x="10" y="46" width="8" height="8" fill="#fff"/>
      <rect x="41" y="41" width="6" height="6" fill="#0f172a"/><rect x="53" y="41" width="6" height="6" fill="#0f172a"/>
      <rect x="47" y="47" width="6" height="6" fill="#0f172a"/><rect x="41" y="53" width="6" height="6" fill="#0f172a"/>
      <rect x="28" y="28" width="6" height="6" fill="#0f172a"/><rect x="28" y="10" width="6" height="6" fill="#0f172a"/>
      <rect x="10" y="28" width="6" height="6" fill="#0f172a"/>
    </g>
  </defs>
  <rect width="980" height="480" fill="#ffffff"/>

  <text x="490" y="56" font-size="29" font-weight="800" fill="#0f172a" text-anchor="middle">Get started in 3 steps</text>
  <text x="490" y="88" font-size="15.5" fill="#475569" text-anchor="middle">Meet a friend, install their apps, use them offline.</text>

  <!-- Panel 1 -->
  <rect x="40" y="112" width="275" height="320" rx="16" fill="#eff6ff" stroke="#bfdbfe"/>
  <circle cx="177" cy="150" r="20" fill="#2563eb"/><text x="177" y="157" font-size="20" font-weight="800" fill="#fff" text-anchor="middle">1</text>
  <!-- QR with scan brackets -->
  <use href="#qr" x="145" y="200"/>
  <g stroke="#2563eb" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M133,196 v-10 h10"/><path d="M221,196 v-10 h-10"/><path d="M133,272 v10 h10"/><path d="M221,272 v10 h-10"/>
  </g>
  <text x="177" y="320" font-size="15" font-weight="700" fill="#0f172a" text-anchor="middle">Scan your friend's</text>
  <text x="177" y="342" font-size="15" font-weight="700" fill="#0f172a" text-anchor="middle">QR code</text>
  <text x="177" y="372" font-size="12" fill="#64748b" text-anchor="middle">a quick hello, in person</text>

  <!-- Panel 2 -->
  <rect x="352" y="112" width="275" height="320" rx="16" fill="#f5f3ff" stroke="#ddd6fe"/>
  <circle cx="489" cy="150" r="20" fill="#7c3aed"/><text x="489" y="157" font-size="20" font-weight="800" fill="#fff" text-anchor="middle">2</text>
  <!-- phone with Library grid -->
  <rect x="447" y="186" width="84" height="150" rx="14" fill="#1e293b"/>
  <rect x="456" y="200" width="66" height="122" rx="6" fill="#f1f5f9"/>
  <g>
    <rect x="463" y="208" width="22" height="22" rx="5" fill="#2563eb"/><rect x="493" y="208" width="22" height="22" rx="5" fill="#16a34a"/>
    <rect x="463" y="236" width="22" height="22" rx="5" fill="#f59e0b"/><rect x="493" y="236" width="22" height="22" rx="5" fill="#e11d48"/>
    <rect x="463" y="264" width="22" height="22" rx="5" fill="#0d9488"/><rect x="493" y="264" width="22" height="22" rx="5" fill="#7c3aed"/>
  </g>
  <text x="489" y="320" font-size="9" fill="#94a3b8" text-anchor="middle">Library</text>
  <text x="489" y="362" font-size="15" font-weight="700" fill="#0f172a" text-anchor="middle">Install their apps</text>
  <text x="489" y="384" font-size="15" font-weight="700" fill="#0f172a" text-anchor="middle">with one tap</text>

  <!-- Panel 3 -->
  <rect x="665" y="112" width="275" height="320" rx="16" fill="#ecfdf5" stroke="#bbf7d0"/>
  <circle cx="802" cy="150" r="20" fill="#16a34a"/><text x="802" y="157" font-size="20" font-weight="800" fill="#fff" text-anchor="middle">3</text>
  <!-- phone with open site + offline badge -->
  <rect x="760" y="186" width="84" height="150" rx="14" fill="#1e293b"/>
  <rect x="769" y="200" width="66" height="122" rx="6" fill="#ffffff"/>
  <rect x="769" y="200" width="66" height="16" rx="6" fill="#16a34a"/>
  <rect x="776" y="226" width="52" height="5" rx="2.5" fill="#cbd5e1"/>
  <rect x="776" y="238" width="40" height="5" rx="2.5" fill="#e2e8f0"/>
  <rect x="776" y="250" width="46" height="5" rx="2.5" fill="#e2e8f0"/>
  <rect x="776" y="266" width="52" height="22" rx="5" fill="#ecfdf5" stroke="#16a34a"/>
  <g transform="translate(848,300)"><rect x="-30" y="0" width="60" height="22" rx="11" fill="#16a34a"/><text x="0" y="15" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">offline ✓</text></g>
  <text x="802" y="362" font-size="15" font-weight="700" fill="#0f172a" text-anchor="middle">Open an app —</text>
  <text x="802" y="384" font-size="15" font-weight="700" fill="#0f172a" text-anchor="middle">works offline</text>

  <!-- arrows between panels -->
  <line x1="320" y1="272" x2="348" y2="272" stroke="#2563eb" stroke-width="3" marker-end="url(#ar)"/>
  <line x1="633" y1="272" x2="661" y2="272" stroke="#2563eb" stroke-width="3" marker-end="url(#ar)"/>

  <text x="490" y="462" font-size="13.5" font-style="italic" fill="#64748b" text-anchor="middle">The more friends you meet, the more sites you can reach.</text>
</svg>
