<svg xmlns="http://www.w3.org/2000/svg" width="960" height="590" viewBox="0 0 960 590" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="h4arr" markerWidth="12" markerHeight="12" refX="6.5" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 Z" fill="#16a34a"/></marker>
  </defs>
  <rect width="960" height="590" fill="#ffffff"/>

  <text x="480" y="52" font-size="29" font-weight="800" fill="#0f172a" text-anchor="middle">Apps you install live on your home screen</text>
  <text x="480" y="84" font-size="15.5" fill="#475569" text-anchor="middle">Install once, and the app gets its own icon — tap to open it, like any other app.</text>

  <!-- ===== phone (the home screen) ===== -->
  <rect x="352" y="104" width="256" height="452" rx="36" fill="#1e293b"/>
  <rect x="368" y="128" width="224" height="404" rx="24" fill="#eef2ff"/>
  <!-- status bar + camera dot -->
  <text x="388" y="153" font-size="11" font-weight="600" fill="#475569">9:41</text>
  <circle cx="480" cy="147" r="3" fill="#334155"/>
  <rect x="556" y="145" width="18" height="9" rx="2" fill="#94a3b8"/>

  <!-- icon grid 3x2 — cols 414/480/546, rows 268/396 -->
  <!-- Hide & Seek (just installed) -->
  <g transform="translate(389,243)">
    <rect x="-4" y="-4" width="58" height="58" rx="17" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="4 4"/>
    <rect width="50" height="50" rx="14" fill="#2563eb"/>
    <text x="25" y="33" font-size="22" text-anchor="middle">🔦</text>
    <g transform="translate(36,-11)"><rect width="34" height="17" rx="8.5" fill="#16a34a"/><text x="17" y="12.5" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">NEW</text></g>
  </g>
  <text x="414" y="332" font-size="10.5" font-weight="600" fill="#334155" text-anchor="middle">Hide &amp; Seek</text>

  <!-- Event Map -->
  <g transform="translate(455,243)"><rect width="50" height="50" rx="14" fill="#f59e0b"/><text x="25" y="33" font-size="22" text-anchor="middle">🗺️</text></g>
  <text x="480" y="332" font-size="10.5" font-weight="600" fill="#334155" text-anchor="middle">Event Map</text>

  <!-- Party Chat -->
  <g transform="translate(521,243)"><rect width="50" height="50" rx="14" fill="#16a34a"/><text x="25" y="33" font-size="22" text-anchor="middle">💬</text></g>
  <text x="546" y="332" font-size="10.5" font-weight="600" fill="#334155" text-anchor="middle">Party Chat</text>

  <!-- Zine -->
  <g transform="translate(389,371)"><rect width="50" height="50" rx="14" fill="#7c3aed"/><text x="25" y="33" font-size="22" text-anchor="middle">📖</text></g>
  <text x="414" y="460" font-size="10.5" font-weight="600" fill="#334155" text-anchor="middle">Zine</text>

  <!-- Market -->
  <g transform="translate(455,371)"><rect width="50" height="50" rx="14" fill="#e11d48"/><text x="25" y="33" font-size="22" text-anchor="middle">🛒</text></g>
  <text x="480" y="460" font-size="10.5" font-weight="600" fill="#334155" text-anchor="middle">Market</text>

  <!-- Myco -->
  <g transform="translate(521,371)"><rect width="50" height="50" rx="14" fill="#0d9488"/><text x="25" y="33" font-size="21" text-anchor="middle">🍄</text></g>
  <text x="546" y="460" font-size="10.5" font-weight="600" fill="#334155" text-anchor="middle">Myco</text>

  <!-- home indicator -->
  <rect x="446" y="508" width="68" height="5" rx="2.5" fill="#cbd5e1"/>

  <!-- ===== left: from a friend, installing ===== -->
  <g transform="translate(66,250)">
    <rect width="184" height="118" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
    <g transform="translate(16,16)">
      <rect width="30" height="30" rx="9" fill="#4f46e5"/>
      <path d="M11 9 L20 20 L15.5 24 L15.5 5 L20 9 L11 20" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
    </g>
    <text x="56" y="27" font-size="11.5" font-weight="700" fill="#4f46e5">from a friend</text>
    <text x="56" y="42" font-size="10.5" fill="#64748b">over Bluetooth</text>
    <rect x="22" y="60" width="42" height="42" rx="11" fill="#2563eb"/><text x="43" y="88" font-size="19" text-anchor="middle">🔦</text>
    <text x="76" y="80" font-size="11" font-weight="700" fill="#334155">Hide &amp; Seek</text>
    <text x="76" y="95" font-size="10" fill="#64748b">tap to install</text>
  </g>
  <text x="158" y="392" font-size="12" font-weight="700" fill="#16a34a" text-anchor="middle">install — 1 tap</text>
  <path d="M252,300 C312,280 342,275 388,270" fill="none" stroke="#16a34a" stroke-width="2.6" stroke-dasharray="6 5" marker-end="url(#h4arr)"/>

  <!-- ===== right: tap to open, offline ===== -->
  <g transform="translate(706,250)">
    <rect width="188" height="118" rx="14" fill="#ecfdf5" stroke="#86efac"/>
    <text x="20" y="30" font-size="14" font-weight="800" fill="#15803d">tap to open</text>
    <text x="20" y="54" font-size="12" fill="#334155">It opens full-screen,</text>
    <text x="20" y="72" font-size="12" fill="#334155">like any app —</text>
    <g transform="translate(20,82)"><rect width="120" height="24" rx="12" fill="#ffffff" stroke="#16a34a"/><text x="60" y="16" font-size="11.5" font-weight="700" fill="#15803d" text-anchor="middle">works offline ✓</text></g>
  </g>
  <path d="M704,300 C672,302 640,300 610,300" fill="none" stroke="#16a34a" stroke-width="2.4"/>

  <text x="480" y="578" font-size="13.5" font-style="italic" fill="#64748b" text-anchor="middle">The apps you collect become real icons on your phone — Myco is just the one that manages them.</text>
</svg>
