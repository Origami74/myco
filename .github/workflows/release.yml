name: Release

# Build a release APK and publish it to GitHub Releases on a version tag.
# Modelled on reference/bitchat-android, adapted for Myco's Rust cross-compile
# (myco-core + the gitignored `fips` core) and optional release signing.
#
# Signing is OPT-IN via repo secrets (Settings → Secrets and variables → Actions):
#   RELEASE_KEYSTORE_BASE64  base64 of your myco-release.jks  (`base64 -i myco-release.jks | pbcopy`)
#   RELEASE_STORE_PASSWORD   keystore password
#   RELEASE_KEY_ALIAS        key alias (e.g. myco)
#   RELEASE_KEY_PASSWORD     key password
# Without them the build still runs and ships an *unsigned* APK.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'   # e.g. v0.1.0

env:
  FIPS_REPO: https://github.com/jmcorgan/fips.git
  FIPS_REF: ble-v2          # fips fork branch carrying the mobile features
  NDK_VERSION: 26.1.10909125

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create the GitHub Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # `fips` is a gitignored local path dep (reference/fips). A fresh checkout
      # has no `reference/` at all, so clone the fork branch into place.
      - name: Fetch fips core
        run: git clone --depth 1 --branch "$FIPS_REF" "$FIPS_REPO" reference/fips

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK ${{ env.NDK_VERSION }}
        run: sdkmanager "ndk;${NDK_VERSION}"

      - name: Set up Rust (aarch64-linux-android)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      # Decode the signing keystore if the secret is set; otherwise build unsigned.
      # Exporting MYCO_RELEASE_STORE_FILE flips on the Gradle release signingConfig.
      - name: Stage signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/myco-release.jks"
            echo "MYCO_RELEASE_STORE_FILE=$RUNNER_TEMP/myco-release.jks" >> "$GITHUB_ENV"
            echo "Release will be SIGNED."
          else
            echo "No RELEASE_KEYSTORE_BASE64 secret — building an UNSIGNED release APK."
          fi

      # Derive the APK version from the tag: versionName = tag minus the leading
      # `v`; versionCode = the run number (monotonic, so updates are detectable).
      - name: Derive version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "MYCO_VERSION_NAME=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "MYCO_VERSION_CODE=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Build release APK
        working-directory: android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
          MYCO_RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          MYCO_RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          MYCO_RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Stage APK for release
        run: |
          cd android/app/build/outputs/apk/release
          ls -lh ./*.apk
          apk=$(ls app-release*.apk | head -1)
          out="$GITHUB_WORKSPACE/myco-${GITHUB_REF_NAME:-dev}-arm64.apk"
          cp "$apk" "$out"
          echo "APK=$out" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: myco-release-${{ github.ref_name }}
          path: ${{ env.APK }}
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK }}
          name: Myco ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Optional: publish to Zapstore after the GitHub Release exists ---
      # Zapstore pulls the signed APK from the GitHub Release (release_source in
      # zapstore.yaml). Sign the Zapstore *event* with a remote signer (no nsec
      # in CI) by storing a NIP-46 bunker URL as the SIGN_WITH secret.
      #
      # - name: Publish to Zapstore
      #   if: startsWith(github.ref, 'refs/tags/')
      #   env:
      #     SIGN_WITH: ${{ secrets.ZAPSTORE_BUNKER_URL }}   # bunker://pubkey?relay=...&secret=...
      #   run: |
      #     go install github.com/zapstore/zsp@latest
      #     "$(go env GOPATH)/bin/zsp" publish
